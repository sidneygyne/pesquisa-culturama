<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesquisa Culturama</title>
  </head>
  <body>
    <header>
      <h1>Pesquisa Culturama</h1>
    </header>
    <section>
      <form action="" method="get">
        <fieldset>
          <legend>Dados pessoais</legend>
          <label for="userName">Nome:</label>
          <input type="text" name="userName" required />

          <label for="userAge">Idade:</label>
          <input type="number" name="userAge" required min="12" max="120" />

          <label for="birthDate">Data de Nascimento:</label>
          <input type="date" name="birthDate" />

          <label for="userEmail">Email:</label>
          <input type="email" name="userEmail" required />

          <label for="userPhoneNumber">Telefone:</label>
          <input
            type="tel"
            name="userPhoneNumber"
            pattern="[0-9] {11}"
            placeholder="9999999999"
            required
          />

          <label for="userImage">Upload de foto:</label>
          <input type="file" accept="image/*" name="userImage" />
        </fieldset>
        <button type="submit">Enviar</button>
      </form>
    </section>
  </body>
</html>
