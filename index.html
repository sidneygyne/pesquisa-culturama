<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesquisa Culturama</title>
  </head>
  <body>
    <header>
      <h1>Pesquisa Culturama</h1>
    </header>
    <section>
      <form action="" method="get">
        <fieldset>
          <legend>Dados pessoais</legend>

          <label for="name">Nome:</label>
          <input type="text" name="userName" required  id="name"/>

          <label for="age">Idade:</label>
          <input type="number" name="userAge" required min="12" max="120" id="age" />

          <label for="birthDate">Data de Nascimento:</label>
          <input type="date" name="userbirthDate" id="birthDate" />

          <label for="email">Email:</label>
          <input type="email" name="userEmail" required  id="email"/>

          <label for="phoneNumber">Telefone:</label>
          <input
            type="tel"
            name="userPhoneNumber"
            pattern="[0-9]{11}"
            placeholder="99999999999"
            required
            id="phoneNumber"
          />

          <label for="image">Upload de foto:</label>
          <input type="file" accept="image/*" name="userImage" id="image" />
        </fieldset>

        <fieldset>
          <legend>Perfil</legend>

          <p>Gênero:</p>
          <input type="radio" name="uderGender" value="Masculino" id="male" />
          <label for="male">Masculino</label>

          <input type="radio" name="uderGender" value="Feminimo" id="female" />
          <label for="female">Feminimo</label>

          <input type="radio" name="uderGender" value="Prefiro não informar" id="preferNotToSay" />
          <label for="preferNotToSay">Prefiro não informar</label>

          <label for="maritalStatus">Estado Civil:</label>
          <select name="userMaritalStatus" id="maritalStatus" required>
            <option value="Casado">Casado</option>
            <option value="Solteiro">Solteiro</option>
            <option value="Divorciado">Divorciado</option>
            <option value="Viúvo">Viúvo</option>
          </select>

          <label for="state">Estado:</label>
          <select name="userState" id="state" required>
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR">Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
          </select>

          <label for="city">Cidade:</label>
          <input type="text" name="userCity" id="city" autocomplete="address-level2"/>
        </fieldset>
        
        <fieldset>
            <legend>Hábitos</legend>

            <p for="social">Redes sociais:</P>
            <input type="checkbox" name="social" id="instagram" value="instagram"/>
            <label for="instagram">Instagram</label>
            <input type="checkbox" name="social" id="facebook" value="facebook"/>
            <label for="facebook">Facebook</label>
            <input type="checkbox" name="social" id="linkedin" value="linkedin"/>
            <label for="linkedin">LinkedIn</label>
             <input type="checkbox" name="social" id="x" value="x"/>
            <label for="x">X</label>
            <input type="checkbox" name="social" id="github" value="github"/>
            <label for="github">GitHub</label>


            <label for="musicStyle">Estilo musical preferido:</label>
            <input list="styleTypes" name="userMusicStyle" id="musicStyle" autocomplete="music-genre"/>
            <datalist id="styleTypes">
                <option id="rock" value="Rock"/>
                <option id="pop" value="Pop"/>
                <option id="sertanejo" value="Sertanejo"/>
                <option id="funk" value="Funk"/>
                <option id="mpb" value="MPB"/>
                <option id="eletronica" value="Eletrônica"/>
            </datalist>
        </fieldset>

        <button type="submit">Enviar</button>
      </form>
    </section>
  </body>
</html>
